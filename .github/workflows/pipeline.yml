name: Pipeline Demo

on:
  push:
    branches:
      - "feature/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

    # Install dependencies and build the project
      - run: npm ci
      - run: npm run build
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
  deploy-to-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: angtlin/simple-node-server:latest
  deploy-to-render:
    needs: deploy-to-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Trigger deployment
        run: |
          chmod +x ./scripts/render-get-service-id.sh
          SERVICE_ID=$(./scripts/render-get-service-id.sh simple-node-server "docker.io/${{ vars.DOCKER_HUB_IMAGE_PATH }}:latest")
          curl -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
        env:
            RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
            